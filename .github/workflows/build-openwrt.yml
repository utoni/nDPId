name: OpenWrt Build

on:
  schedule:
    # At the end of every day
    - cron: '0 0 * * *'
  # TODO: Enable after openwrt/gh-action-sdk is working again.
  #push:
  #  branches:
  #    - main
  #    - tmp
  #pull_request:
  #  branches:
  #    - main
  #  types: [opened, synchronize, reopened]
  release:
    types: [created]

jobs:
  build:
    name: ${{ matrix.arch }} ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
            target: aarch64-generic

          - arch: mips_24kc
            target: mips-24kc

          - arch: arm_cortex-a15_neon-vfpv4
            target: armvirt-32

          - arch: x86_64
            target: x86-64

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1

      - name: Build
        uses: openwrt/gh-action-sdk@797d0e3d0eb13b355c3447f60d0179d4b43089e2
        env:
          ARCH: ${{ matrix.arch }}-snapshot
          FEED_DIR: ${{ github.workspace }}/packages/openwrt
          FEEDNAME: ndpid_openwrt_packages_ci
          PACKAGES: nDPId-testing
          V: s

      - name: Store packages
        uses: actions/upload-artifact@v7
        with:
          name: nDPId-${{ matrix.arch}}-${{ matrix.target }}
          path: bin/packages/${{ matrix.arch }}/ndpid_openwrt_packages_ci/*.ipk
